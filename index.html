<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0b0a">
  <title>Festival Timeline</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="hero">
    <div class="hero__eyebrow">RUNNING ORDER · 2026</div>
    <h1 id="festival-name">Festival Timeline</h1>
    <p id="festival-meta" class="hero__meta"></p>
  </header>

  <main>
    <section class="controls" aria-label="Filtros da programação">
      <div id="day-filters" class="day-tabs" role="tablist" aria-label="Dias"></div>
      <div class="filter-row">
        <label class="search"><span aria-hidden="true">⌕</span><input id="search" type="search" placeholder="Buscar artista…" autocomplete="off"></label>
        <div class="filter-actions">
          <div id="stage-filters" class="stage-filters" aria-label="Palcos"></div>
          <div id="zoom-control" class="zoom-control" aria-label="Zoom da timeline"></div>
        </div>
      </div>
    </section>

    <section class="schedule-section" aria-live="polite">
      <div class="schedule-heading">
        <div><p class="kicker">PROGRAMAÇÃO</p><h2 id="selected-day"></h2></div>
        <p id="event-count" class="event-count"></p>
      </div>
      <div id="timeline" class="timeline"></div>
      <div id="empty-state" class="empty-state" hidden>Nenhum show encontrado com estes filtros.</div>
    </section>
  </main>

  <footer><span id="footer-name"></span><span>Todos os horários estão sujeitos a alterações.</span></footer>

  <script src="data/lineup.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
